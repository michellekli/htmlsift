repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: mixed-line-ending
    -   id: check-yaml
    -   id: sort-simple-yaml
    -   id: check-added-large-files
-   repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
    # Run the linter.
    - id: ruff-check
      types_or: [ python, pyi ]
      args: [ --fix ]
    # Run the formatter.
    - id: ruff-format
      types_or: [ python, pyi ]
-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
    -   id: mypy
        files: ^src/python/.*\.py$
        args: [--strict]
        additional_dependencies: [
            nh3>=0.3.5
        ]
-   repo: local
    hooks:
    # ensure lockfile is up-to-date
    -   id: local-renv-status
        name: renv
        language: script
        entry: hooks/renv.sh
        pass_filenames: false
    # ensure R Shiny manifest is up-to-date
    -   id: local-write-manifest
        name: write-manifest
        language: r
        entry: Rscript hooks/write-manifest.R
        pass_filenames: false
    -   id: local-diff-manifest
        name: diff-manifest
        language: script
        entry: hooks/diff-manifest.sh
        pass_filenames: false
    # unit test Python logic
    -   id: local-unittest
        name: unittest
        language: python
        entry: uv run python -m unittest
        pass_filenames: false
    # lints and styles
    -   id: local-lintr
        name: lintr
        language: r
        entry: Rscript hooks/lintr.R
        files: ^src/shiny/.*\.R$
